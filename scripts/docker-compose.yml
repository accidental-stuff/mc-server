services:
  crafty:
    container_name: crafty_container
    image: arcadiatechnology/crafty-4:latest
    restart: always
    environment:
      - TZ=Asia/Kolkata
    ports:
      - "127.0.0.1:8443:8443"
      - "8123:8123"
      - "19132:19132/udp"
      - "25565:25565"
    volumes:
      - /home/mcs/docker/backups:/crafty/backups
      - /home/mcs/docker/logs:/crafty/logs
      - /home/mcs/docker/servers:/crafty/servers
      - /home/mcs/docker/config:/crafty/app/config
      - /home/mcs/docker/import:/crafty/import
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8443)); s.close()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  caddy:
    image: caddy:2
    container_name: caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/mcs/docker/caddy/Caddyfile:/etc/caddy/Caddyfile
      - /home/mcs/docker/caddy/data:/data
      - /home/mcs/docker/caddy/config:/config
    depends_on:
      crafty:
        condition: service_healthy